<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumah Nada Brawijaya - Studio Booking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body oncontextmenu="return false;">

    <nav>
        <div class="logo"><i class="fas fa-music"></i> <span>Rumah Nada Brawijaya</span></div>
        <div class="nav-btns">
            <button class="btn btn-outline" id="theme-toggle"><i id="theme-icon" class="fas fa-sun"></i></button>
            <a href="admin.html" class="btn btn-accent"><i class="fas fa-user-lock"></i> <span>Portal Admin</span></a>
        </div>
    </nav>

    <div class="container">
        <div class="calendar-header-wrapper">
            <div class="nav-controls">
                    <button class="btn btn-outline nav-btn" id="prev-week"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="week-label">Memuat...</h2>
                    <button class="btn btn-outline nav-btn" id="next-week"><i class="fas fa-chevron-right"></i></button>
                </div>
            <div class="current-info">
                
                <button class="btn btn-accent main-booking-btn" id="open-booking-main">
                    <i class="fas fa-calendar-plus"></i> <span>Booking Sekarang</span>
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="booking-table">
                <thead><tr id="table-head"><th>Jam</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="booking-modal" class="modal">
    <div class="modal-content">
        <h3 class="flex-center"><i class="fas fa-edit"></i> <span>Formulir Sewa</span></h3>
        
        <label>Nama Penyewa/Band</label>
        <input type="text" id="book-name" placeholder="Masukkan Nama">
        
        <label>Nomor WA (Aktif)</label>
        <input type="tel" id="book-phone" placeholder="628xxx">
        
        <label>Tanggal</label>
        <input type="date" id="book-date">
        
        <div class="time-row">
            <div>
                <label>Mulai</label>
                <select id="book-start" class="styled-select"></select>
            </div>
            <div>
                <label>Selesai</label>
                <select id="book-end" class="styled-select"></select>
            </div>
        </div>

        <p style="color: red; font-size: 0.8rem; margin-top: 5px; margin-bottom: 15px;">
            *Maksimal penyewaan studio adalah 3 jam.
        </p>

        <button class="btn btn-accent w-100" id="submit-booking">
            <i class="fas fa-paper-plane"></i> <span>Ajukan Booking</span>
        </button>
        
        <button class="btn btn-outline w-100 mt-10 close-modal">Batal</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
